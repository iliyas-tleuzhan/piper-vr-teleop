name: piper-vr
channels:
  - conda-forge
dependencies:
  - python=3.9
  - numpy
  - pyyaml
  - matplotlib
  - pip
  - pip:
      - piper-sdk
      - pure-python-adb
      - pytest
      - rospkg
      - meshcat
      - imageio-ffmpeg
      - trimesh
      - pycollada
      # Install oculus_reader separately with scripts/install_oculus_reader.sh.
